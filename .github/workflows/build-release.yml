name: Build and Release

on:
  push:
    branches:
      - main
      - dev

jobs:
  # ā”€ā”€ā”€ Job 1: Build concatenated .ps1 ā”€ā”€ā”€
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          BASE_VERSION=$(jq -r '.version' manifest.json)
          echo "Base version from manifest: $BASE_VERSION"

          if [ "${{ github.ref_name }}" = "main" ]; then
            # Check if tag already exists
            if git tag -l "v${BASE_VERSION}" | grep -q .; then
              echo "Tag v${BASE_VERSION} already exists, auto-bumping patch..."
              LATEST_TAG=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | grep -v '-' | head -1)
              if [ -n "$LATEST_TAG" ]; then
                LATEST=${LATEST_TAG#v}
                MAJOR=$(echo "$LATEST" | cut -d. -f1)
                MINOR=$(echo "$LATEST" | cut -d. -f2)
                PATCH=$(echo "$LATEST" | cut -d. -f3)
                PATCH=$((PATCH + 1))
                VERSION="${MAJOR}.${MINOR}.${PATCH}"
              else
                VERSION="$BASE_VERSION"
              fi
            else
              VERSION="$BASE_VERSION"
            fi
          else
            VERSION="$BASE_VERSION"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

      - name: Update manifest.json if version bumped
        if: github.ref_name == 'main'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          CURRENT=$(jq -r '.version' manifest.json)
          if [ "$VERSION" != "$CURRENT" ]; then
            jq --arg v "$VERSION" '.version = $v' manifest.json > manifest.tmp && mv manifest.tmp manifest.json
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add manifest.json
            git commit -m "ci: auto-bump version to $VERSION"
            git push
            echo "Manifest updated to $VERSION"
          else
            echo "No bump needed, version $VERSION is new"
          fi

      - name: Build Script
        run: |
          # Build a single .ps1 with UTF-8 BOM (required by PowerShell 5.1 for accented chars)
          # 1. Write UTF-8 BOM
          printf '\xEF\xBB\xBF' > ./PrepareEwonSD_latest.ps1

          # 2. Concatenate modules in dependency order, stripping any embedded BOMs
          for f in \
            ./scripts/modules/AppState.ps1 \
            ./scripts/modules/Localization.ps1 \
            ./scripts/modules/Validation.ps1 \
            ./scripts/modules/Config.ps1 \
            ./scripts/modules/Network.ps1 \
            ./scripts/modules/Firmware.ps1 \
            ./scripts/modules/Generator.ps1 \
            ./scripts/modules/UIHelpers.ps1 \
            ./scripts/modules/UI.ps1 \
            ./scripts/Prepare_Ewon_SD.ps1; do
            LC_ALL=C sed '1s/^\xEF\xBB\xBF//' "$f" >> ./PrepareEwonSD_latest.ps1
          done

      - name: Upload .ps1 artifact
        uses: actions/upload-artifact@v4
        with:
          name: ps1-script
          path: ./PrepareEwonSD_latest.ps1

  # ā”€ā”€ā”€ Job 2: Compile C# wrapper ā†’ .exe (Windows) ā”€ā”€ā”€
  package:
    needs: build
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download .ps1 artifact
        uses: actions/download-artifact@v4
        with:
          name: ps1-script
          path: ./wrapper

      - name: Generate icon
        shell: pwsh
        run: |
          & ./scripts/GenerateIcon.ps1 -OutputPath ./wrapper/icon.ico

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Set version in .csproj
        shell: pwsh
        run: |
          $version = "${{ needs.build.outputs.version }}"
          $csproj = Get-Content ./wrapper/EwonFlexySdPrep.csproj -Raw
          $csproj = $csproj -replace '(<\/PropertyGroup>)', "    <Version>$version</Version>`n  `$1"
          Set-Content ./wrapper/EwonFlexySdPrep.csproj $csproj
          Write-Host "Version set to $version"

      - name: Publish .exe
        run: |
          dotnet publish ./wrapper/EwonFlexySdPrep.csproj -c Release -r win-x64 -o ./publish

      - name: Upload .exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: exe-app
          path: ./publish/EwonFlexySdPrep.exe

  # ā”€ā”€ā”€ Job 3: Create GitHub Release ā”€ā”€ā”€
  release:
    needs: [build, package]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Prepare release info
        id: release_info
        run: |
          VERSION="${{ needs.build.outputs.version }}"

          if [ "${{ github.ref_name }}" = "main" ]; then
            TAG="v${VERSION}"
            NAME="v${VERSION}"
            PRERELEASE="false"
          else
            TAG="v${VERSION}-dev.${{ github.run_number }}"
            NAME="v${VERSION}-dev.${{ github.run_number }} (pre-release)"
            PRERELEASE="true"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "Release: $NAME (tag: $TAG, prerelease: $PRERELEASE)"

      - name: Generate release notes
        run: |
          BODY_TEMPLATE=$(cat .github/release-body.md)

          BODY="${BODY_TEMPLATE}"
          BODY="${BODY//\{\{VERSION\}\}/${{ steps.release_info.outputs.tag }}}"
          BODY="${BODY//\{\{DATE\}\}/$(date +'%Y-%m-%d')}"
          BODY="${BODY//\{\{COMMIT_SHA\}\}/${{ github.sha }}}"
          BODY="${BODY//\{\{COMMIT_MSG\}\}/${{ github.event.head_commit.message }}}"

          echo "$BODY" > release_notes.md

          echo "" >> release_notes.md
          echo "## Commits inclus" >> release_notes.md
          git log -10 --pretty=format:"- %s (%h)" >> release_notes.md

      - name: Publish Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.release_info.outputs.tag }}
          name: ${{ steps.release_info.outputs.name }}
          bodyFile: release_notes.md
          prerelease: ${{ steps.release_info.outputs.prerelease }}
          artifacts: |
            ./artifacts/ps1-script/PrepareEwonSD_latest.ps1
            ./artifacts/exe-app/EwonFlexySdPrep.exe
          allowUpdates: true
          removeArtifacts: true
