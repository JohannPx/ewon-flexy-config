name: Build and Release

on:
  push:
    branches:
      - main

jobs:
  # ─── Job 1: Build concatenated .ps1 ───
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          BASE_VERSION=$(jq -r '.version' manifest.json)
          echo "Base version from manifest: $BASE_VERSION"

          # Auto-bump patch if tag already exists
          if git tag -l "v${BASE_VERSION}" | grep -q .; then
            echo "Tag v${BASE_VERSION} already exists, auto-bumping patch..."
            LATEST_TAG=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | grep -v '-' | head -1)
            if [ -n "$LATEST_TAG" ]; then
              LATEST=${LATEST_TAG#v}
              MAJOR=$(echo "$LATEST" | cut -d. -f1)
              MINOR=$(echo "$LATEST" | cut -d. -f2)
              PATCH=$(echo "$LATEST" | cut -d. -f3)
              PATCH=$((PATCH + 1))
              VERSION="${MAJOR}.${MINOR}.${PATCH}"
            else
              VERSION="$BASE_VERSION"
            fi
          else
            VERSION="$BASE_VERSION"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

      - name: Update manifest.json if version bumped
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          CURRENT=$(jq -r '.version' manifest.json)
          if [ "$VERSION" != "$CURRENT" ]; then
            jq --arg v "$VERSION" '.version = $v' manifest.json > manifest.tmp && mv manifest.tmp manifest.json
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add manifest.json
            git commit -m "ci: auto-bump version to $VERSION"
            git push
            echo "Manifest updated to $VERSION"
          else
            echo "No bump needed, version $VERSION is new"
          fi

      - name: Build Script
        run: |
          # Build a single .ps1 with UTF-8 BOM (required by PowerShell 5.1 for accented chars)
          # 1. Write UTF-8 BOM
          printf '\xEF\xBB\xBF' > ./PrepareEwonSD_latest.ps1

          # 2. Concatenate modules in dependency order, stripping any embedded BOMs
          for f in \
            ./scripts/modules/AppState.ps1 \
            ./scripts/modules/Localization.ps1 \
            ./scripts/modules/Validation.ps1 \
            ./scripts/modules/Config.ps1 \
            ./scripts/modules/Network.ps1 \
            ./scripts/modules/Firmware.ps1 \
            ./scripts/modules/Generator.ps1 \
            ./scripts/modules/UIHelpers.ps1 \
            ./scripts/modules/UI.ps1 \
            ./scripts/Prepare_Ewon_SD.ps1; do
            LC_ALL=C sed '1s/^\xEF\xBB\xBF//' "$f" >> ./PrepareEwonSD_latest.ps1
          done

          # 3. Inject resolved version (replaces @APP_VERSION@ placeholder in AppState.ps1)
          sed -i "s/@APP_VERSION@/${{ steps.version.outputs.version }}/g" ./PrepareEwonSD_latest.ps1

      - name: Upload .ps1 artifact
        uses: actions/upload-artifact@v4
        with:
          name: ps1-script
          path: ./PrepareEwonSD_latest.ps1

  # ─── Job 2: Compile C# wrapper → .exe (Windows) ───
  package:
    needs: build
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download .ps1 artifact
        uses: actions/download-artifact@v4
        with:
          name: ps1-script
          path: ./wrapper

      - name: Generate icon
        shell: pwsh
        run: |
          & ./scripts/GenerateIcon.ps1 -OutputPath ./wrapper/icon.ico

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Set version in .csproj
        shell: pwsh
        run: |
          $version = "${{ needs.build.outputs.version }}"
          $csproj = Get-Content ./wrapper/EwonFlexySdPrep.csproj -Raw
          $csproj = $csproj -replace '(<\/PropertyGroup>)', "    <Version>$version</Version>`n  `$1"
          Set-Content ./wrapper/EwonFlexySdPrep.csproj $csproj
          Write-Host "Version set to $version"

      - name: Publish .exe
        run: |
          dotnet publish ./wrapper/EwonFlexySdPrep.csproj -c Release -r win-x64 -o ./publish

      - name: Upload .exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: exe-app
          path: ./publish/EwonFlexySdPrep.exe

  # ─── Job 3: Create GitHub Release ───
  release:
    needs: [build, package]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Prepare release info
        id: release_info
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          TAG="v${VERSION}"
          NAME="v${VERSION}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "Release: $NAME (tag: $TAG)"

      - name: Generate release notes
        env:
          VERSION_TAG: ${{ steps.release_info.outputs.tag }}
          SHA: ${{ github.sha }}
        run: |
          # Need full history and tags to compute the changelog range
          git fetch --tags --force

          # Range = previous semver tag → HEAD (excluding the tag we're about to publish)
          PREV_TAG=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname \
                     | grep -v '-' | grep -v "^${VERSION_TAG}$" | head -1)
          if [ -z "$PREV_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${PREV_TAG}..HEAD"
          fi
          echo "Changelog range: $RANGE"

          FEATS=""; FIXES=""; DOCS=""; REFACTORS=""; CIS=""; TESTS=""; OTHERS=""

          while IFS='|' read -r MSG HASH; do
            [ -z "$MSG" ] && continue
            # Skip auto-generated noise
            case "$MSG" in
              "Merge pull request"*|"Merge branch"*|"ci: auto-bump version"*) continue ;;
            esac
            ENTRY="- ${MSG} (${HASH})"
            case "$MSG" in
              feat:*|feat\(*) FEATS="${FEATS}${ENTRY}"$'\n' ;;
              fix:*|fix\(*) FIXES="${FIXES}${ENTRY}"$'\n' ;;
              docs:*|docs\(*) DOCS="${DOCS}${ENTRY}"$'\n' ;;
              refactor:*|refactor\(*) REFACTORS="${REFACTORS}${ENTRY}"$'\n' ;;
              ci:*|ci\(*) CIS="${CIS}${ENTRY}"$'\n' ;;
              test:*|test\(*) TESTS="${TESTS}${ENTRY}"$'\n' ;;
              *) OTHERS="${OTHERS}${ENTRY}"$'\n' ;;
            esac
          done < <(git log $RANGE --pretty=tformat:'%s|%h')

          {
            [ -n "$FEATS" ]     && { echo "**✨ Nouveautés**"; echo ""; printf '%s\n' "$FEATS"; }
            [ -n "$FIXES" ]     && { echo "**🐛 Corrections**"; echo ""; printf '%s\n' "$FIXES"; }
            [ -n "$REFACTORS" ] && { echo "**♻️ Refactor**"; echo ""; printf '%s\n' "$REFACTORS"; }
            [ -n "$DOCS" ]      && { echo "**📚 Documentation**"; echo ""; printf '%s\n' "$DOCS"; }
            [ -n "$CIS" ]       && { echo "**⚙️ CI / Build**"; echo ""; printf '%s\n' "$CIS"; }
            [ -n "$TESTS" ]     && { echo "**🧪 Tests**"; echo ""; printf '%s\n' "$TESTS"; }
            [ -n "$OTHERS" ]    && { echo "**🔧 Autres**"; echo ""; printf '%s\n' "$OTHERS"; }
            [ -z "$FEATS$FIXES$REFACTORS$DOCS$CIS$TESTS$OTHERS" ] && echo "_Aucun changement notable._"
          } > changelog.md

          # Substitute placeholders in the template (bash handles multiline values fine)
          CHANGELOG=$(cat changelog.md)
          BODY=$(cat .github/release-body.md)
          BODY="${BODY//\{\{VERSION\}\}/$VERSION_TAG}"
          BODY="${BODY//\{\{DATE\}\}/$(date +'%Y-%m-%d')}"
          BODY="${BODY//\{\{COMMIT_SHA\}\}/$SHA}"
          BODY="${BODY//\{\{CHANGELOG\}\}/$CHANGELOG}"

          echo "$BODY" > release_notes.md
          echo "----- Release notes -----"
          cat release_notes.md

      - name: Publish Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.release_info.outputs.tag }}
          name: ${{ steps.release_info.outputs.name }}
          bodyFile: release_notes.md
          prerelease: false
          artifacts: |
            ./artifacts/ps1-script/PrepareEwonSD_latest.ps1
            ./artifacts/exe-app/EwonFlexySdPrep.exe
          allowUpdates: true
          removeArtifacts: true
